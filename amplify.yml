version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 18 && nvm use 18
        - npm ci --prefix frontend
    build:
      commands:
        - npm run build --prefix frontend
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
