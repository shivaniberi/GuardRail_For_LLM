version: '3.9'

services:
  guardrail:
    build: .
    image: guardrail-backend:latest
    container_name: guardrail
    restart: always
    ports:
      - '8000:8000'
      - '11434:11434'
    env_file: .env
    volumes:
      - ollama-data:/root/.ollama   # Ollama model weights persist across restarts

volumes:
  ollama-data:
